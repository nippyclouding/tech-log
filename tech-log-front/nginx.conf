limit_req_zone $binary_remote_addr zone=site_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

# Only abusive public write endpoints use the stricter bucket. An empty key is not counted.
map "$request_method:$uri" $sensitive_request_ip {
    default "";
    "POST:/api/admin/session/login" $binary_remote_addr;
    "POST:/api/subscriptions" $binary_remote_addr;
    "POST:/api/subscriptions/unsubscribe-request" $binary_remote_addr;
    ~^POST:/api/posts/[^/]+/comments$ $binary_remote_addr;
    ~^(PUT|DELETE):/api/posts/[^/]+/comments/[^/]+$ $binary_remote_addr;
}
limit_req_zone $sensitive_request_ip zone=sensitive_per_ip:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};
    limit_req_status 429;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        limit_req zone=site_per_ip burst=40 nodelay;
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;
    limit_req_status 429;

    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        limit_req zone=sensitive_per_ip burst=2 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /admin-console {
        limit_req zone=site_per_ip burst=40 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /oauth2/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /login/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /image/ {
        limit_req zone=site_per_ip burst=40 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        limit_req zone=site_per_ip burst=40 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
