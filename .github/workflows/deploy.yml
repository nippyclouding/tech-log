name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tech-log-front/package-lock.json

      - name: Verify frontend
        working-directory: tech-log-front
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Test backend
        working-directory: tech-log-back
        run: ./gradlew test --no-daemon

  publish:
    name: Publish Docker images
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./tech-log-front
          push: true
          tags: |
            ghcr.io/nippyclouding/tech-log-nginx:${{ github.sha }}
            ghcr.io/nippyclouding/tech-log-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./tech-log-back
          push: true
          tags: |
            ghcr.io/nippyclouding/tech-log-backend:${{ github.sha }}
            ghcr.io/nippyclouding/tech-log-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to EC2
    needs: publish
    # This gate must be a repository/org variable; environment variables are loaded after job scheduling.
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deployment on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          SSH_PORT="${EC2_SSH_PORT:-22}"
          printf -v DEPLOY_DIR '%q' "$EC2_DEPLOY_PATH"
          ssh -i ~/.ssh/ec2_deploy_key -p "$SSH_PORT" "$EC2_SSH_USER@$EC2_HOST" \
            "cd -- $DEPLOY_DIR && DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_BRANCH='main' ./deploy/deploy.sh"
