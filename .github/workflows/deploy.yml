name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tech-log-front/package-lock.json

      - name: Verify frontend
        working-directory: tech-log-front
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Test backend
        working-directory: tech-log-back
        run: ./gradlew test --no-daemon

  deploy:
    name: Deploy to EC2
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deployment on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          SSH_PORT="${EC2_SSH_PORT:-22}"
          printf -v DEPLOY_DIR '%q' "$EC2_DEPLOY_PATH"
          ssh -i ~/.ssh/ec2_deploy_key -p "$SSH_PORT" "$EC2_SSH_USER@$EC2_HOST" \
            "cd -- $DEPLOY_DIR && DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_BRANCH='main' ./deploy/deploy.sh"
